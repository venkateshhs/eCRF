<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName casee.example.org
    ServerAdmin admin@example.org

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/casee.example.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/casee.example.org/privkey.pem

    ProxyRequests Off
    ProxyPreserveHost On

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyTimeout 120

    ProxyPass        / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    ErrorLog ${APACHE_LOG_DIR}/casee-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/casee-ssl-access.log combined
</VirtualHost>
</IfModule>