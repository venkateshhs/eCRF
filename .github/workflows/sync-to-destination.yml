name: Sync source repo to destination repo

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Remove workflow files
        run: |
          rm -rf .github/workflows

      - name: Commit workflow removal if needed
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "Exclude workflow files from sync"

      - name: Push source main to destination main
        env:
          DEST_TOKEN: ${{ secrets.DEST_REPO_PAT }}
        run: |
          set -euo pipefail

          if [ -z "${DEST_TOKEN}" ]; then
            echo "DEST_REPO_PAT secret is missing"
            exit 1
          fi

          git remote remove destination 2>/dev/null || true
          git remote add destination "https://x-access-token:${DEST_TOKEN}@github.com/Biomarker-Development-at-INM7/eCRF.git"

          git push --force destination HEAD:main