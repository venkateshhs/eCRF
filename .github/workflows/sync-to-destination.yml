name: Sync source repo to destination repo

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Push source main to destination main
        env:
          DEST_TOKEN: ${{ secrets.DEST_REPO_PAT }}
        run: |
          set -euo pipefail

          if [ -z "${DEST_TOKEN}" ]; then
            echo "DEST_REPO_PAT secret is missing"
            exit 1
          fi

          git remote add destination https://x-access-token:${DEST_TOKEN}@github.com/Biomarker-Development-at-INM7/eCRF.git

          git push destination main:main --force